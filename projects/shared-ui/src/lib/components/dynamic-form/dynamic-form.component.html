<form [formGroup]="form" (ngSubmit)="submit()">
    <ng-container class="form-group" *ngFor="let field of fields">
            <label>
                <span *ngIf="field.required" style="color:red">*</span>
                {{field.label}}
            </label>
            <input class="form-control" *ngIf="field.type !== 'select' && field.type !== 'checkbox' && field.type !=='radio' && field.type !=='textarea'"
            [type]="field.type" [placeholder]="field.placeholder" [formControlName]="field.name"/>

            <textarea class="form-control" *ngIf="field.type == 'textarea'" 
            [formControlName]="field.name">
            </textarea>

            <select class="form-control" *ngIf="field.type == 'select'" 
            [formControlName]="field.name">
                <option *ngFor="let opt of field.options" [value]="opt.value">
                        {{opt.label}}
                </option>
            </select>
            
            <input class="form-control"
            *ngIf="field.type === 'checkbox'"
            type="checkbox"
            [formControlName]="field.name"
            />

            <input class="form-control"
            *ngIf="field.type === 'radio'"
            type="radio" [name]="field.name"
            [formControlName]="field.name"
            />

            <div *ngIf="form.get(field.name)?.touched && form.get(field.name)?.invalid"></div>
            <small *ngIf="form.get(field.name)?.errors?.['required']">
                {{field.label}} is required
            </small>
    </ng-container>
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

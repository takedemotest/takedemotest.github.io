  <div class="card card-flex">
   <div class="card_header">
     <h5>{{cardTitle}}</h5>
      <ng-content select="header"></ng-content>
   </div>
   <div class="card_body">
        <ng-content select="body"></ng-content>
   </div>
   <div class="card_footer" *ngIf="hasFooter">
   <ng-content select="[footer]"></ng-content>
   </div>
  </div>
